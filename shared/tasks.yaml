# 轻量级任务与流程映射

# tasks 只描述任务本身：谁做、允许什么状态、做完到哪里、需要哪些产物。
# workflows 决定不同需求类型走哪几步。
# workflow 为 pending 或 workflow_detection.status 未 confirmed 时，不查普通 workflow map，先由 product-agent 执行 product.clarify 做 workflow 建议与确认。
# workflows.done_next 是默认下一角色；任务 steps 写明条件分支时，以条件分支设置的 next 为准。
# 注意：full-stack 在 development_ready 后允许 Backend / FE 并行推进；单代理执行时默认先进入 Backend。
# 使用者在开发前确认节点明确“OK、继续、确认推进”时，确认完成后应自动衔接到 done_next 对应开发角色。
# 开发期 UI 反馈快修是显式轻量通道，可临时使用 frontend.ui_feedback_fix，不按普通 next_task_map 分诊。
# 后补设计稿进入 design/source.md 时，若此前已记录跳过 UI 验收，跳过结论自动失效，phase 进入 ui_design_ready，next 进入 designer-agent。

tasks:
  project.rescan:
    agent: product-agent
    title: 项目画像重扫
    allowed_phase: [project_rescan_required]
    requires_next: product-agent
    done_phase: planned
    done_requires:
      - brief.md
    steps: |
      读取 pipeline.project.yaml 中的 knowledge.project_details。
      根据 blockers 中记录的项目画像冲突原因，重新扫描项目结构、技术栈、命令、前后端约定和测试入口。
      同步更新项目能力识别：可开发后端、可开发前端、路径、证据和置信度。
      更新 project-details.md，只记录可复用项目事实，不记录一次性需求细节。
      向使用者确认新的项目画像。
      使用者确认后，在 status.history 记录重扫原因和确认结果，将 phase 重置为 planned，重新开启当前 feature 流程。

  product.clarify:
    agent: product-agent
    title: 需求澄清
    allowed_phase: [planned]
    requires_next: product-agent
    done_phase: requirements_ready
    done_requires:
      - source-materials.md
      - brief.md
      - test/coverage.md
    steps: |
      如果 status.workflow_detection.status 不是 confirmed，先根据项目画像的前后端能力和本次需求意图建议 workflow，写入 workflow_detection，并向使用者确认；确认前不得进入下游接口/TODO/开发任务。
      读取 PRD、用户描述与上下文；如果用户用“需求文档：...，接口文档：...，测试case：...，设计稿：...，材料：...，整合材料：...”提供素材，先归档到 source-materials.md。
      对“材料：”批量输入先做类型识别；对“整合材料：”先做章节/内容拆分；识别或拆分不确定时向使用者确认，不要猜测归档。
      将需求文档或识别出的需求部分整理进 brief.md；将接口文档或识别出的接口部分整理进 api.openapi.yaml；将测试 case 或识别出的测试部分整理进 test/cases.md；将设计稿或识别出的设计说明整理进 design/source.md。
      如果当前项目只有前端，但用户提供了接口文档，仍需整理 api.openapi.yaml，并供 FE 后续读取。
      先判断需求是否足够进入技术拆解；不完整时向使用者发起澄清。
      完成功能包 brief.md、验收标准、待确认项与测试覆盖说明。
      确认需求完整后推进到 requirements_ready。

  product.document:
    agent: product-agent
    title: 产品/文档整理
    allowed_phase: [planned]
    requires_next: product-agent
    done_phase: done
    done_next: null
    done_requires:
      - source-materials.md
      - brief.md
    steps: |
      如果用户用“需求文档：...，接口文档：...，测试case：...，设计稿：...，材料：...，整合材料：...”提供素材，先归档到 source-materials.md，并对批量/整合材料先做材料识别。
      梳理背景、范围、验收标准和待确认问题。
      仅产出文档，不进入研发实现。
      完成后直接推进到 done。

  backend.api_contract:
    agent: backend-agent
    title: 接口文档与后端 TODO
    allowed_phase: [requirements_ready]
    requires_next: backend-agent
    done_phase: api_contract_ready
    done_requires:
      - api.openapi.yaml
      - backend/todo.md
    steps: |
      读取 brief.md、source-materials.md 与 test/coverage.md。
      如果 source-materials.md 中已有接口文档来源，优先按该来源整理或校正 api.openapi.yaml。
      先产出或修正 api.openapi.yaml，再拆解 backend/todo.md。
      不写业务代码。
      接口文档未被使用者确认前，不进入 Backend / FE 开发。

  frontend.todo:
    agent: frontend-agent
    title: 前端 TODO 拆解
    allowed_phase: [requirements_ready, api_contract_ready]
    requires_next: frontend-agent
    done_phase: frontend_todo_ready
    done_requires:
      - frontend/todo.md
    steps: |
      读取 brief.md、source-materials.md、test/coverage.md；如有 api.openapi.yaml，也一并读取。
      不写业务代码，只拆解前端开发 TODO。
      写 frontend/todo.md，包含页面、组件、状态、接口联调、测试、设计走查与风险。

  product.confirm_development:
    agent: product-agent
    title: 开发前确认
    allowed_phase: [api_contract_ready, frontend_todo_ready]
    requires_next: product-agent
    done_phase: development_ready
    done_requires:
      - brief.md
      - confirmations/development-confirmation.md
    steps: |
      按当前 workflow 只汇总适用角色的 TODO 和接口文档。
      backend-only 只确认 api.openapi.yaml 与 backend/todo.md。
      frontend-only 只确认 frontend/todo.md；如果没有后端介入，不要求 api.openapi.yaml。
      full-stack 必须先确认 api.openapi.yaml，再确认 backend/todo.md 与 frontend/todo.md。
      不适用的 TODO 不得作为门禁要求，但必须在确认文件中写明不适用原因。
      向使用者确认需求、接口文档和技术 TODO 是否可以进入开发。
      使用者确认前不得推进。
      使用者确认后写 confirmations/development-confirmation.md 记录确认内容，并推进到 development_ready。
      如果本轮输入已经包含使用者明确确认继续（例如“OK 继续推进”“确认，可以开始开发”），不要停在 development_ready；写入确认记录并更新 status 后，立即按 workflows.done_next[product.confirm_development] 衔接到开发角色。
      full-stack 进入 development_ready 后，Backend 和 FE 可以同步开始；单代理执行时默认先衔接 backend-agent，除非使用者明确要求先前端。

  backend.implement:
    agent: backend-agent
    title: 后端实现
    allowed_phase: [development_ready, backend_fix_needed]
    requires_next: backend-agent
    done_phase: backend_done
    done_requires:
      - backend/notes.md
    steps: |
      读取 brief.md、api.openapi.yaml、backend/todo.md 与 confirmations/development-confirmation.md。
      在 apps.backend.path 内实现接口或服务端逻辑。
      写 backend/notes.md，必须包含建议测试点、影响范围和是否建议扩大测试范围。
      后端完成后，test-agent 可以先介入测试后端部分。

  frontend.implement:
    agent: frontend-agent
    title: 前端实现
    allowed_phase: [development_ready, backend_tested, frontend_fix_needed, ui_fix_needed]
    requires_next: frontend-agent
    done_phase: frontend_done
    done_requires:
      - frontend/integration.md
    steps: |
      读取 brief.md、frontend/todo.md、confirmations/development-confirmation.md；如有 api.openapi.yaml，也读取接口契约。
      在 apps.frontend.path 内完成页面、交互或联调。
      写 frontend/integration.md，必须包含建议测试点、影响范围和是否建议扩大测试范围。
      推进 frontend_done 前必须完成 UI 关键项自检，并在 frontend/integration.md 记录 checklist 结果；类型检查、lint 或单测通过不能替代视觉自检。
      前端完成后检查是否存在 design/source.md，或使用者是否明确要求 UI 验收。
      如果有设计材料或明确要求 UI 验收，next 设为 designer-agent，先进入 UI 验收。
      如果没有设计材料且使用者未要求 UI 验收，next 设为 test-agent，直接进入前端分段测试；在 frontend/integration.md、status.ui_review 和 status.history 中记录“本轮跳过 UI 验收”的原因。
      后续补充设计稿时，可以显式把 next 设为 designer-agent，单独调用 UI 走查。

  frontend.ui_feedback_fix:
    agent: frontend-agent
    title: 开发期 UI 反馈快修
    allowed_phase: [development_ready, backend_tested, frontend_done, ui_reviewed, frontend_tested, frontend_fix_needed, ui_fix_needed]
    requires_next: frontend-agent
    done_phase: keep_current
    done_requires:
      - design/feedback.md
      - frontend/review-fixes.md
    steps: |
      仅在使用者于开发过程中提供 UI 截图反馈或轻量体验反馈时执行，例如按钮样式、抽屉层级、footer 透出、表格对齐、间距、层级、文案、颜色、图标、响应式微调。
      如果反馈来自 QA、UAT、送测、线上回归、缺陷平台链接，或使用者明确说 Bug，则不得走本任务，必须进入正式 bugs/ 流程。
      读取 brief.md、frontend/todo.md、frontend/integration.md、design/source.md（如果存在）和用户本轮截图/反馈。
      先把反馈原文、截图或链接、页面区域、期望效果、处理状态写入 design/feedback.md。
      仅修复前端 UI 范围内的小改动；如果涉及产品范围、接口契约、数据规则、主流程阻塞或验收标准变化，写入 blockers 并向使用者确认，不要快修。
      在 apps.frontend.path 内完成最小 UI 修复。
      写 frontend/review-fixes.md，记录对应 Feedback ID、修复摘要、修改文件、验证方式和未覆盖风险。
      默认不改变 phase/next，不进入 test-agent 分诊；只追加 status.history 和 activity.md。

  test.backend:
    agent: test-agent
    title: 后端分段测试
    allowed_phase: [backend_done]
    requires_next: test-agent
    done_phase: backend_tested
    done_requires:
      - test/backend-report.md
    steps: |
      读取 test/coverage.md、api.openapi.yaml、backend/notes.md。
      先读取 Backend 提供的建议测试点、影响范围和扩测建议，判断是否需要扩大测试范围，并在报告中记录判断。
      测试后端接口、服务逻辑、权限、错误处理和数据边界。
      写 test/backend-report.md。
      通过则记录通过；失败则写 blockers，并把 phase 设为 backend_fix_needed，next 设为 backend-agent。

  designer.review:
    agent: designer-agent
    title: UI 验收
    allowed_phase: [planned, ui_design_ready, frontend_done, frontend_tested, full_tested, done]
    requires_next: designer-agent
    done_phase: ui_reviewed
    done_requires:
      - design/ui-review.md
    steps: |
      对照 brief.md、design/source.md、frontend/todo.md 与 frontend/integration.md 做 UI/交互验收。
      如果是后补设计稿或单独调用 UI 走查，先归档设计稿来源到 design/source.md，再限定本次走查范围。
      如果此前 frontend/integration.md、status.ui_review 或测试报告记录过“无设计材料，跳过 UI 验收”，必须在 design/ui-review.md、status.ui_review 和 status.history 中标记该跳过结论已失效。
      写 design/ui-review.md。
      通过后 test-agent 可以进入前端部分测试；如果此前已经完成过 frontend/full 测试，test-agent 必须基于 UI 走查影响范围判断是否需要重测。
      有 P0/P1 阻塞问题时写 blockers，并把 phase 设为 ui_fix_needed，next 设为 frontend-agent。

  test.frontend:
    agent: test-agent
    title: 前端分段测试
    allowed_phase: [frontend_done, ui_reviewed]
    requires_next: test-agent
    done_phase: frontend_tested
    done_requires:
      - test/frontend-report.md
    steps: |
      读取 test/coverage.md、frontend/integration.md；如有 api.openapi.yaml，也读取接口契约。
      如果存在 design/ui-review.md，则一并读取并纳入测试范围；如果本轮没有设计材料或 UI 验收被明确跳过，记录原因，不把 design/ui-review.md 作为门禁。若 design/source.md 是后补且已使跳过 UI 验收结论失效，则必须等待 ui_reviewed 后再执行前端分段测试。
      先读取 FE 提供的建议测试点、影响范围和扩测建议，判断是否需要扩大测试范围，并在报告中记录判断。
      测试前端主流程、交互状态、接口联调、权限、异常、空状态和回归风险。
      写 test/frontend-report.md。
      通过则记录通过；失败则写 blockers，并把 phase 设为 frontend_fix_needed，next 设为 frontend-agent。

  test.full:
    agent: test-agent
    title: 全量测试
    allowed_phase: [backend_tested, frontend_tested]
    requires_next: test-agent
    done_phase: full_tested
    done_requires:
      - test/full-report.md
    steps: |
      读取当前 workflow 要求的所有产物。
      确认当前 workflow 要求的 Backend 分段测试和 FE 分段测试已经通过。
      如果本轮存在设计材料或已执行 UI 验收，则确认 UI 验收已通过；如果没有设计材料且已记录跳过原因，则 UI 验收不作为全量测试门禁。若后补 design/source.md 已使跳过 UI 验收结论失效，则必须等待 ui_reviewed 和必要的前端复测后再执行全量测试。
      执行全量回归或端到端验证。
      写 test/full-report.md。
      通过后推进到 full_tested；失败时按归属写 blockers，并把 phase 设为 backend_fix_needed、frontend_fix_needed 或 ui_fix_needed。

  test.bug_triage:
    agent: test-agent
    title: 送测 Bug 分诊
    allowed_phase: [bug_triage]
    requires_next: test-agent
    done_phase: bug_triaged
    done_requires:
      - bugs
    steps: |
      读取 bugs/ 下新增或待处理的 Bug 记录、brief.md、接口契约、实现交接和既有测试报告。
      如果 Bug 来自 Bug链接 或 external_issue，先检查 external_issue.fetch_status；只有 fetched 或使用者已补充正文时，才进入归属判断。
      复核缺陷来源、严重级别、复现步骤、期望结果、实际结果、截图或日志证据。
      判断缺陷归属：后端问题设 phase=backend_fix_needed,next=backend-agent；前端功能问题设 phase=frontend_fix_needed,next=frontend-agent；UI/交互走查问题设 phase=ui_fix_needed,next=frontend-agent。
      如果归属不确定、复现信息不足或需求规则不明确，写入 blockers，向使用者确认，不推进到修复阶段。
      在对应 bugs/<bug-id>.md 中记录 triage 结论、归属理由、建议修复范围和建议复测点。
      追加 activity.md，并在 status.history 记录 bug triage 结果。

  product.accept:
    agent: product-agent
    title: 产品验收与通知
    allowed_phase: [full_tested, ui_reviewed]
    requires_next: product-agent
    done_phase: done
    done_next: null
    done_requires:
      - brief.md
    steps: |
      对照验收标准和当前 workflow 要求的产物。
      确认无 P0 阻塞后推进到 done。
      状态变为 done 后按当前 workflow 通知使用者通过结论和关键文档位置。

  test.regression:
    agent: test-agent
    title: 测试回归
    allowed_phase: [planned, requirements_ready, development_ready, backend_fix_needed, frontend_fix_needed, ui_fix_needed]
    requires_next: test-agent
    done_phase: done
    done_next: null
    done_requires:
      - test/report.md
    steps: |
      明确回归范围与风险点。
      执行 API、页面或手工回归用例。
      写 test/report.md，列出通过项、失败项和未覆盖风险。

  commit.note:
    agent: commit-agent
    title: 提交记录与可选提交
    allowed_phase: [planned, requirements_ready, api_contract_ready, frontend_todo_ready, development_ready, backend_done, backend_tested, frontend_done, ui_design_ready, ui_reviewed, frontend_tested, full_tested, backend_fix_needed, frontend_fix_needed, ui_fix_needed, bug_triage, done]
    requires_next: commit-agent
    done_phase: keep_current
    done_requires:
      - commit/notes.md
    steps: |
      仅在使用者明确要求“提交代码、生成 commit、先 commit、提交当前进度、同步外部 Bug 备注”时执行。
      读取 status.yaml、相关角色产物、测试报告、Bug 记录和当前 git status/diff。
      判断提交类型：中途提交为 checkpoint，完成后提交为 final；不确定时向使用者确认。
      生成 commit/notes.md，必须包含当前 phase/next、commit message、文件范围、已完成内容、验证情况和外部同步状态；中途提交只提示已完成内容。
      提交前必须向使用者确认 commit message 和文件范围；未确认时只生成 notes，不执行 git commit。
      如果使用者确认提交，执行 git commit 并记录 commit hash。
      如果关联 bugs/<bug-id>.md，回写修复摘要、commit 信息和同步状态。
      如果 external_issue 可写评论，提交后同步修复备注；同步失败不回滚本地 commit，记录失败原因和补偿动作。
      默认不推进 phase/next，只追加 status.history；除非使用者明确要求继续流程。

workflows:
  # 全链路：需求澄清 -> 接口文档/TODO -> 使用者确认 -> Backend/FE 同步开发 -> Backend 测试 / 条件 UI 验收 -> FE 测试 -> 全量测试 -> 产品验收通知
  full-stack:
    description: 同时涉及产品、后端、前端、测试和 UI 走查。
    start: product.clarify
    next_task_map:
      product-agent:
        project_rescan_required: project.rescan
        planned: product.clarify
        frontend_todo_ready: product.confirm_development
        full_tested: product.accept
      backend-agent:
        requirements_ready: backend.api_contract
        development_ready: backend.implement
        backend_fix_needed: backend.implement
      frontend-agent:
        api_contract_ready: frontend.todo
        development_ready: frontend.implement
        backend_tested: frontend.implement
        frontend_fix_needed: frontend.implement
        ui_fix_needed: frontend.implement
      designer-agent:
        ui_design_ready: designer.review
        frontend_done: designer.review
        frontend_tested: designer.review
        full_tested: designer.review
        done: designer.review
      test-agent:
        bug_triage: test.bug_triage
        backend_done: test.backend
        frontend_done: test.frontend
        ui_reviewed: test.frontend
        frontend_tested: test.full
      commit-agent:
        planned: commit.note
        requirements_ready: commit.note
        api_contract_ready: commit.note
        frontend_todo_ready: commit.note
        development_ready: commit.note
        backend_done: commit.note
        backend_tested: commit.note
        frontend_done: commit.note
        ui_design_ready: commit.note
        ui_reviewed: commit.note
        frontend_tested: commit.note
        full_tested: commit.note
        backend_fix_needed: commit.note
        frontend_fix_needed: commit.note
        ui_fix_needed: commit.note
        bug_triage: commit.note
        done: commit.note
    done_next:
      project.rescan: product-agent
      product.clarify: backend-agent
      backend.api_contract: frontend-agent
      frontend.todo: product-agent
      product.confirm_development: backend-agent
      backend.implement: test-agent
      test.backend: frontend-agent
      frontend.implement: test-agent
      designer.review: test-agent
      test.bug_triage: test-agent
      test.frontend: test-agent
      test.full: product-agent
      frontend.ui_feedback_fix: frontend-agent
      commit.note: commit-agent
    final_requires:
      - brief.md
      - api.openapi.yaml
      - backend/todo.md
      - frontend/todo.md
      - confirmations/development-confirmation.md
      - backend/notes.md
      - test/backend-report.md
      - frontend/integration.md
      - test/frontend-report.md
      - test/full-report.md

  # 只有服务端：需求澄清 -> 接口文档/TODO -> 使用者确认 -> 后端开发 -> 后端测试 -> 全量测试 -> 产品验收通知
  backend-only:
    description: 只涉及接口、服务端逻辑、任务调度或数据处理。
    start: product.clarify
    next_task_map:
      product-agent:
